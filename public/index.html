<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>shellbook</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header id="app-header">
    <div id="header-brand">
      <h1>shellbook<span id="app-version"></span><span id="session-status-dot" class="status-dot" title="Session status"></span></h1>
    </div>
    <nav id="tabs">
      <button class="tab-btn active" data-tab="notes">Notes</button>
      <button class="tab-btn" data-tab="processes">Processes <span id="running-badge" class="badge hidden">0</span></button>
    </nav>
    <div id="header-settings">
      <button id="sidebar-toggle-btn" class="icon-btn" title="Toggle sidebar">
        <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
          <rect x="1.5" y="2.5" width="13" height="11" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
          <rect x="1.5" y="2.5" width="5" height="11" rx="1.5" fill="currentColor" fill-opacity="0.55" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>
      <button id="raw-mode-toggle-btn" class="icon-btn" title="Toggle raw markdown editor">
        <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
          <path fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" d="M5.5 4 2 8l3.5 4M10.5 4 14 8l-3.5 4"/>
        </svg>
      </button>
      <button id="theme-toggle-btn" class="icon-btn" title="Toggle dark/light mode">
        <svg class="icon-moon" viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
          <path fill="currentColor" d="M13.5 9.5A6 6 0 0 1 6.5 2.5a6.5 6.5 0 1 0 7 7Z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="3.2" fill="currentColor"/>
          <g stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
            <path d="M8 1.2v1.6M8 13.2v1.6M1.2 8h1.6M13.2 8h1.6M3.1 3.1l1.1 1.1M11.8 11.8l1.1 1.1M12.9 3.1l-1.1 1.1M4.2 11.8l-1.1 1.1"/>
          </g>
        </svg>
      </button>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
          <g stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
            <line x1="2" y1="4" x2="14" y2="4"/>
            <line x1="2" y1="8" x2="14" y2="8"/>
            <line x1="2" y1="12" x2="14" y2="12"/>
          </g>
          <circle cx="6" cy="4" r="1.6" fill="currentColor"/>
          <circle cx="11" cy="8" r="1.6" fill="currentColor"/>
          <circle cx="7" cy="12" r="1.6" fill="currentColor"/>
        </svg>
      </button>
      <div id="header-meta"></div>
    </div>
  </header>

  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="settings-close-btn" class="icon-btn" title="Close">
          <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
            <path stroke="currentColor" stroke-width="1.4" stroke-linecap="round" d="M3 3l10 10M13 3 3 13"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="settings-row">
          <div class="settings-row-header">
            <span class="settings-label">Notes folder</span>
          </div>
          <div class="settings-value">
            <span id="settings-notes-folder-label"></span>
            <button id="settings-notes-folder-reset-btn" class="icon-btn hidden" title="Reset to default folder">
              <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
                <path fill="none" stroke="currentColor" stroke-width="1.2" d="M13 4.5A5.5 5.5 0 1 0 14 8"/>
                <path fill="currentColor" d="M13 1.5v3.5h-3.5z"/>
              </svg>
            </button>
          </div>
          <div class="settings-hint">The folder currently open in the sidebar. Change it from the sidebar's folder button, or reset it back to the default folder here.</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-header">
            <span class="settings-label">App data folder</span>
          </div>
          <div class="settings-value">
            <span id="app-data-folder-label"></span>
            <button id="app-data-folder-browse-btn" class="icon-btn" title="Browse…">
              <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
                <path fill="currentColor" d="M1.5 4c0-.55.45-1 1-1h3.6l1.3 1.5h6.1c.55 0 1 .45 1 1v6.5c0 .55-.45 1-1 1h-11c-.55 0-1-.45-1-1V4Z"/>
              </svg>
            </button>
            <button id="app-data-folder-reset-btn" class="icon-btn hidden" title="Reset to default folder">
              <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
                <path fill="none" stroke="currentColor" stroke-width="1.2" d="M13 4.5A5.5 5.5 0 1 0 14 8"/>
                <path fill="currentColor" d="M13 1.5v3.5h-3.5z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="settings-footer">
          <button id="clear-app-data-btn" class="danger">Clear all app data</button>
        </div>
      </div>
    </div>
  </div>

  <section id="notes-view" class="view active">
    <aside id="note-list">
      <div id="note-list-header">
        <span>Notes</span>
        <div id="note-list-actions">
          <button id="reload-notes-btn" class="icon-btn" title="Refresh notes list">
            <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
              <path fill="none" stroke="currentColor" stroke-width="1.2" d="M13 4.5A5.5 5.5 0 1 0 14 8"/>
              <path fill="currentColor" d="M13 1.5v3.5h-3.5z"/>
            </svg>
          </button>
          <button id="open-folder-btn" class="icon-btn" title="Open notes folder…">
            <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
              <path fill="currentColor" d="M1.5 4c0-.55.45-1 1-1h3.6l1.3 1.5h6.1c.55 0 1 .45 1 1v6.5c0 .55-.45 1-1 1h-11c-.55 0-1-.45-1-1V4Z"/>
            </svg>
          </button>
          <button id="new-note-btn" class="icon-btn" title="New note">
            <svg viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
              <rect fill="currentColor" x="7" y="2" width="2" height="12" rx="1"/>
              <rect fill="currentColor" x="2" y="7" width="12" height="2" rx="1"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="notes-folder-info">
        <span id="notes-folder-label"></span>
      </div>
      <div id="note-list-items"></div>
    </aside>
    <main id="note-content">
      <div id="note-toolbar" class="hidden">
        <span id="current-filename" title="Click to rename"></span>
        <button id="add-text-btn">+ Text</button>
        <button id="add-block-btn">+ Code Block</button>
        <button id="save-btn">Save</button>
        <button id="save-as-btn">Save As</button>
        <button id="delete-note-btn" class="danger">Delete</button>
      </div>
      <div id="note-items"><p class="empty">Select a note.</p></div>
      <textarea id="raw-note-editor" class="hidden"></textarea>
    </main>
  </section>

  <section id="processes-view" class="view">
    <div id="proc-toolbar">
      <button id="clear-history-btn" class="clear-output-btn">Clear finished</button>
      <button id="kill-all-btn" class="remove-btn">Kill all processes</button>
    </div>
    <table id="proc-table">
      <thead>
        <tr>
          <th data-sort="note">Note</th><th data-sort="block">Block</th><th data-sort="shell">Shell</th><th data-sort="status">Status</th><th data-sort="started">Started</th><th data-sort="duration">Duration</th><th data-sort="logsize">Log Size</th><th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <div id="toast-container"></div>

  <script src="/app.js"></script>
</body>
</html>
